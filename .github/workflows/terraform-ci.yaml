name: Terraform CI

on:
  pull_request:
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.tftest.hcl"
      - ".tflint.hcl"
      - ".github/workflows/terraform-ci.yaml"
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.tftest.hcl"
      - ".tflint.hcl"
      - ".github/workflows/terraform-ci.yaml"

concurrency:
  group: terraform-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  terraform:
    name: Format, validate, lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"
          terraform_wrapper: false

      - name: Terraform fmt (check)
        working-directory: ${{ github.workspace }}
        run: terraform fmt -check -recursive .

      - name: Terraform init (no backend)
        working-directory: main
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        working-directory: main
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.58.0

      - name: TFLint
        working-directory: ${{ github.workspace }}
        run: |
          tflint --init
          tflint --recursive --color

      - name: Terraform test (mocked providers)
        working-directory: main
        run: terraform test -no-color -parallel=2
